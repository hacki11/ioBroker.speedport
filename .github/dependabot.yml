version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: cron
      timezone: "Europe/Berlin"
      cronjob: "29 3 11 * *"
    open-pull-requests-limit: 5
    assignees:
      - hacki11
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "cron"
      timezone: "Europe/Berlin"
      cronjob: "29 3 11 * *"
    open-pull-requests-limit: 5
    assignees:
      - hacki11
